<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-button active" data-tab="youtube">YouTube</button>
            <button class="tab-button" data-tab="audio">Audio (Music)</button>
            <button class="tab-button" data-tab="reddit">Reddit</button>
            <button class="tab-button" data-tab="x">X (Twitter)</button>
        </div>

        <div id="youtube" class="tab-content active">
            <h1>YouTube Video Downloader</h1>
            <input type="text" id="youtube-url" placeholder="Enter YouTube video URL">
            <button id="youtube-download-btn">Download</button>
            <p id="youtube-message"></p>
        </div>

        <div id="audio" class="tab-content">
            <h1>Audio Downloader (Music)</h1>
            <input type="text" id="audio-url" placeholder="Enter YouTube URL">
            <div class="format-row">
                <label><input type="radio" name="audio-format" value="native" checked> Native (Opus/m4a — best quality, no re-encode)</label>
                <label><input type="radio" name="audio-format" value="mp3"> MP3 320kbps (max compatibility)</label>
            </div>
            <button id="audio-download-btn">Download Audio</button>
            <p id="audio-message"></p>
        </div>

        <div id="reddit" class="tab-content">
            <h1>Reddit Video Downloader</h1>
            <input type="text" id="reddit-url" placeholder="Enter Reddit video URL">
            <button id="reddit-download-btn">Download</button>
            <p id="reddit-message"></p>
        </div>

        <div id="x" class="tab-content">
            <h1>X (Twitter) Video Downloader</h1>
            <input type="text" id="x-url" placeholder="Enter X (Twitter) video URL">
            <button id="x-download-btn">Download</button>
            <p id="x-message"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
